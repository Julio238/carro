<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tuned Cars BR - Carros Modificados e Preparados</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'tuned-red': '#e63946',
            'tuned-dark': '#1d1d1d',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">

  <!-- Header Dinâmico -->
  <header class="bg-tuned-dark text-white py-4 shadow-lg sticky top-0 z-50">
    <div class="container mx-auto px-4 flex justify-between items-center">
      <a href="index.html" class="text-2xl font-bold">Tuned<span class="text-tuned-red">Cars</span>BR</a>
      <nav id="mainNav" class="hidden md:flex space-x-6 items-center">
        <!-- Preenchido pelo JavaScript -->
      </nav>
      <button class="md:hidden">☰</button>
    </div>
  </header>

  <!-- Hero + Busca -->
  <section class="bg-gradient-to-r from-gray-900 to-black text-white py-20">
    <div class="container mx-auto px-4 text-center">
      <h1 class="text-4xl md:text-5xl font-bold mb-6">Encontre os Melhores Carros Modificados do Brasil</h1>
      <p class="text-xl mb-10">Preparados, tunados, stage 3, turbo, suspensão, estética...</p>

      <div class="max-w-5xl mx-auto bg-white/10 backdrop-blur-md p-6 rounded-xl">
        <form class="grid grid-cols-1 md:grid-cols-5 gap-4">
          <input type="text" placeholder="Marca / Modelo" class="p-3 rounded-lg text-black">
          <input type="number" placeholder="Preço até (R$)" class="p-3 rounded-lg text-black">
          <select class="p-3 rounded-lg text-black">
            <option>Ano</option><option>2020+</option><option>2015-2019</option>
          </select>
          <select class="p-3 rounded-lg text-black">
            <option>Tipo de Modificação</option><option>Preparado</option><option>Turbo</option>
          </select>
          <button type="submit" class="bg-tuned-red hover:bg-red-700 text-white font-bold p-3 rounded-lg">Buscar</button>
        </form>
      </div>
    </div>
  </section>

  <!-- Grid de Anúncios -->
  <section class="container mx-auto px-4 py-16">
    <h2 class="text-3xl font-bold mb-10 text-center">Destaques Recentes</h2>
    <div id="listaAnuncios" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
  </section>

  <footer class="bg-tuned-dark text-white py-12 text-center">
    <p>© 2026 TunedCarsBR - Marketplace de Carros Modificados</p>
  </footer>

  <script>
    // === HEADER DINÂMICO ===
    const user = JSON.parse(localStorage.getItem('userLogged'));
    const nav = document.getElementById('mainNav');

    if (user && user.loggedIn) {
      let links = `<a href="perfil.html" class="hover:text-tuned-red font-medium">Perfil</a>`;
      if (user.isAdmin) links += ` <a href="admin.html" class="text-green-400 hover:text-green-300 ml-4">Admin</a>`;
      nav.innerHTML = `${links} <button onclick="logout()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg text-sm font-medium ml-4">Sair</button>`;
    } else {
      nav.innerHTML = `
        <a href="login.html" class="hover:text-tuned-red">Entrar</a>
        <a href="cadastro.html" class="bg-tuned-red px-4 py-2 rounded hover:bg-red-700">Cadastrar</a>
      `;
    }

    function logout() {
      localStorage.removeItem('userLogged');
      window.location.href = 'index.html';
    }

    // === CARREGAR ANÚNCIOS ===
    const anuncios = JSON.parse(localStorage.getItem('anuncios')) || [];
    const container = document.getElementById('listaAnuncios');

    if (anuncios.length === 0) {
      container.innerHTML = '<p class="text-center col-span-full text-xl text-gray-500 py-12">Nenhum veículo disponível no momento.</p>';
    } else {
      anuncios.forEach((anuncio, index) => {
        const card = document.createElement('a');
        card.href = `anuncio.html?id=${index}`;
        card.className = "bg-white dark:bg-gray-800 rounded-xl overflow-hidden shadow-lg hover:shadow-2xl transition block";

        const imgSrc = anuncio.imagens?.[0] || 'https://via.placeholder.com/600x400?text=Sem+foto';

        card.innerHTML = `
          <div class="relative">
            <img src="${imgSrc}" alt="${anuncio.marca} ${anuncio.modelo}" class="w-full h-48 object-cover">
            <span class="absolute top-3 left-3 bg-tuned-red text-white px-3 py-1 rounded-full text-sm font-bold">R$ ${(anuncio.preco || 0).toLocaleString('pt-BR')}</span>
          </div>
          <div class="p-5">
            <h3 class="font-bold text-xl">${anuncio.marca} ${anuncio.modelo} ${anuncio.ano || ''}</h3>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-1 line-clamp-2">${anuncio.descricao || 'Veículo preparado'}</p>
          </div>
        `;
        container.appendChild(card);
      });
    }
  </script>
</body>
</html>
