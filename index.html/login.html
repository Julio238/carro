<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - TunedCarsBR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { colors: { 'tuned-red': '#e63946', 'tuned-dark': '#1d1d1d' } } } }
  </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col">

  <header class="bg-tuned-dark text-white py-4 shadow-lg sticky top-0 z-50">
    <div class="container mx-auto px-4 flex justify-between items-center">
      <a href="index.html" class="text-2xl font-bold">Tuned<span class="text-tuned-red">Cars</span>BR</a>
    </div>
  </header>

  <main class="flex-grow flex items-center justify-center py-12 px-4">
    <div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-8 border border-gray-200 dark:border-gray-700">
      <h1 class="text-3xl font-bold text-center mb-2">Entrar na conta</h1>
      <p class="text-center text-gray-600 dark:text-gray-400 mb-8">Acesse sua área pessoal</p>

      <form id="loginForm" class="space-y-6">
        <div>
          <label for="email" class="block text-sm font-medium mb-1">Email</label>
          <input type="email" id="email" required placeholder="@gmail.com" class="w-full px-4 py-3 rounded-lg border">
        </div>
        <div>
          <label for="senha" class="block text-sm font-medium mb-1">Senha</label>
          <input type="password" id="senha" required placeholder="senha" class="w-full px-4 py-3 rounded-lg border">
        </div>

        <div id="mensagem" class="text-center text-sm font-medium hidden"></div>

        <button type="submit" class="w-full bg-tuned-red hover:bg-red-700 text-white font-bold py-4 rounded-lg">Entrar</button>
      </form>

      <p class="mt-6 text-center text-sm">
        Não tem conta? <a href="cadastro.html" class="text-tuned-red hover:underline">Cadastrar</a>
      </p>
    </div>
  </main>

  <footer class="bg-tuned-dark text-white py-6 text-center">
    <p>© 2026 TunedCarsBR</p>
  </footer>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const msg = document.getElementById('mensagem');

      if (email === "julioqeu@gmail.com" && senha === "senha") {
        localStorage.setItem('userLogged', JSON.stringify({
          loggedIn: true,
          nome: "Julio",
          email: email,
          isAdmin: true
        }));
        msg.textContent = "Bem-vindo, Administrador!";
        msg.classList.add('text-green-600');
        msg.classList.remove('hidden');
        setTimeout(() => window.location.href = 'index.html', 1200);
      } 
      else if (email && senha) {
        localStorage.setItem('userLogged', JSON.stringify({
          loggedIn: true,
          nome: email.split('@')[0],
          email: email,
          isAdmin: false
        }));
        msg.textContent = "Login realizado com sucesso!";
        msg.classList.add('text-green-600');
        msg.classList.remove('hidden');
        setTimeout(() => window.location.href = 'index.html', 1200);
      } 
      else {
        msg.textContent = "Email ou senha incorretos.";
        msg.classList.add('text-red-600');
        msg.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
