<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro - TunedCarsBR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'tuned-red': '#e63946',
            'tuned-dark': '#1d1d1d',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col">

  <!-- Header Dinâmico -->
  <header class="bg-tuned-dark text-white py-4 shadow-lg sticky top-0 z-50">
    <div class="container mx-auto px-4 flex justify-between items-center">
      <a href="index.html" class="text-2xl font-bold">Tuned<span class="text-tuned-red">Cars</span>BR</a>
      <nav id="mainNav" class="hidden md:flex space-x-6 items-center">
        <!-- Preenchido via JavaScript -->
      </nav>
    </div>
  </header>

  <!-- Formulário de Cadastro -->
  <main class="flex-grow flex items-center justify-center py-12 px-4">
    <div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-8 border border-gray-200 dark:border-gray-700">
      <h1 class="text-3xl font-bold text-center mb-2">Criar sua conta</h1>
      <p class="text-center text-gray-600 dark:text-gray-400 mb-8">Comece a comprar e vender carros modificados</p>

      <form id="cadastroForm" class="space-y-6">
        <div>
          <label for="nome" class="block text-sm font-medium mb-1">Nome completo</label>
          <input type="text" id="nome" required placeholder="Seu nome" class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700">
        </div>

        <div>
          <label for="email" class="block text-sm font-medium mb-1">Email</label>
          <input type="email" id="email" required placeholder="seuemail@gmail.com" class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700">
        </div>

        <div>
          <label for="telefone" class="block text-sm font-medium mb-1">Telefone / WhatsApp</label>
          <input type="tel" id="telefone" required placeholder="(41) 99999-9999" class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700">
        </div>

        <div>
          <label for="cidade" class="block text-sm font-medium mb-1">Cidade</label>
          <input type="text" id="cidade" required value="Curitiba" class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700">
        </div>

        <div>
          <label for="senha" class="block text-sm font-medium mb-1">Senha</label>
          <input type="password" id="senha" required minlength="8" placeholder="Mínimo 8 caracteres" class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700">
        </div>

        <div>
          <label for="confirmarSenha" class="block text-sm font-medium mb-1">Confirmar senha</label>
          <input type="password" id="confirmarSenha" required placeholder="Digite novamente" class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700">
        </div>

        <div class="flex items-center">
          <input type="checkbox" id="termos" required class="h-4 w-4 text-tuned-red">
          <label for="termos" class="ml-2 text-sm">Aceito os termos de uso e política de privacidade</label>
        </div>

        <div id="mensagem" class="text-center text-sm font-medium hidden"></div>

        <button type="submit" class="w-full bg-tuned-red hover:bg-red-700 text-white font-bold py-4 rounded-lg transition">
          Cadastrar
        </button>
      </form>

      <p class="mt-6 text-center text-sm">
        Já tem conta? <a href="login.html" class="text-tuned-red hover:underline font-medium">Entrar</a>
      </p>
    </div>
  </main>

  <footer class="bg-tuned-dark text-white py-8 text-center">
    <p>© 2026 TunedCarsBR – Marketplace de Carros Modificados</p>
  </footer>

  <script>
    // Header Dinâmico
    const user = JSON.parse(localStorage.getItem('userLogged'));
    const nav = document.getElementById('mainNav');

    if (user && user.loggedIn) {
      let links = `<a href="perfil.html" class="hover:text-tuned-red font-medium">Perfil</a>`;
      if (user.isAdmin) links += ` <a href="admin.html" class="text-green-400 ml-4">Admin</a>`;
      nav.innerHTML = `${links} <button onclick="logout()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg text-sm ml-4">Sair</button>`;
    } else {
      nav.innerHTML = `
        <a href="login.html" class="hover:text-tuned-red">Entrar</a>
        <a href="cadastro.html" class="bg-tuned-red px-4 py-2 rounded hover:bg-red-700">Cadastrar</a>
      `;
    }

    function logout() {
      localStorage.removeItem('userLogged');
      window.location.href = 'index.html';
    }

    // Validação simples do formulário
    document.getElementById('cadastroForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const senha = document.getElementById('senha').value;
      const confirmar = document.getElementById('confirmarSenha').value;
      const msg = document.getElementById('mensagem');

      if (senha !== confirmar) {
        msg.textContent = "As senhas não coincidem!";
        msg.classList.add('text-red-600');
        msg.classList.remove('hidden');
        return;
      }

      if (senha.length < 8) {
        msg.textContent = "A senha deve ter pelo menos 8 caracteres!";
        msg.classList.add('text-red-600');
        msg.classList.remove('hidden');
        return;
      }

      msg.textContent = "Cadastro realizado com sucesso! Redirecionando...";
      msg.classList.add('text-green-600');
      msg.classList.remove('hidden');

      // Simula cadastro e redireciona para login
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 1800);
    });
  </script>
</body>
</html>
